name: Build Naultinus (Windows)

on:
  push:
    branches: [ main, master, "claude/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Restore dependencies
        run: dotnet restore Naultinus.Application/Naultinus.Application.csproj

      - name: Build (Debug)
        run: dotnet build Naultinus.Application/Naultinus.Application.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test Naultinus.Tests/Naultinus.Tests.csproj -c Debug -v normal --logger "console;verbosity=detailed"

      - name: Build (Release)
        run: dotnet build Naultinus.Application/Naultinus.Application.csproj -c Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Naultinus-win-x64
          path: Naultinus.Application/bin/Release/
          retention-days: 14
